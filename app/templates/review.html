{% extends "base.html" %}
{% block title %}Review – {{ line.book_id }}{% endblock %}
{% block content %}

<!-- Ready modal -->
<div id="ready-modal" class="modal-overlay">
  <div class="modal-box">
    <h2>Ready to review?</h2>
    <p>Correct the text if it differs from what you see in the image,<br>
       then confirm or skip.</p>
    <button id="ready-btn" class="btn btn-primary">I'm ready <kbd>Ctrl+Enter</kbd></button>
  </div>
</div>

<div class="annotation-wrap" id="annotation-area" style="display:none">
  <div class="meta">
    <span class="book-id">{{ line.book_id }}</span>
    <span class="line-index">line {{ line.line_index + 1 }}</span>
  </div>

  <div class="line-image-wrap">
    <img src="{{ url_for('image.line_image', line_id=line.id) }}"
         alt="Line image" class="line-image">
  </div>

  <form method="post" action="{{ url_for('review.submit', line_id=line.id) }}" id="annotation-form">
    <input type="hidden" name="elapsed_seconds" id="elapsed-field">
    <textarea name="text" id="text-field" class="ocr-edit" rows="2"
              spellcheck="false">{{ prefill }}</textarea>
    <div class="action-bar">
      <button type="submit" name="action" value="edited" class="btn btn-primary"
              title="Keyboard: Enter (when text changed)">✎ Save correction</button>
      <button type="submit" name="action" value="validated" class="btn btn-success"
              title="Keyboard: V">✓ Confirm as-is</button>
      <button type="submit" name="action" value="skipped" class="btn btn-skip-edit"
              title="Keyboard: S">⏭ Skip (save edit)</button>
    </div>
  </form>
</div>

<script>
  window.ANNOTATOR_MODE = 'review';
</script>
{% endblock %}

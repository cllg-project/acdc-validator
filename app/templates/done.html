{% extends "base.html" %}
{% block title %}All done!{% endblock %}
{% block content %}
<div class="done-card">
  <h1>🎉 Queue empty</h1>
  {% if step == 'validate' %}
    <p>You've annotated all lines in the validation queue.</p>
    <a href="{{ url_for('review.index') }}" class="btn btn-primary">Go to Step 2 – Review</a>
  {% else %}
    <p>Nothing left to review. Thank you!</p>
    <a href="{{ url_for('validate.index') }}" class="btn btn-secondary">Back to Step 1</a>
  {% endif %}
</div>
{% endblock %}
